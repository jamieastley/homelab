name: valheim
services:
  server:
    image: mbround18/valheim:3.6.0
    container_name: valheim_server
    stop_signal: SIGINT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
      - "3000:3000"
    volumes:
      - ~/games/valheim/saves:/home/steam/.config/unity3d/IronGate/Valheim
      - ~/games/valheim/server:/home/steam/valheim
      - ~/games/valheim/backups:/home/steam/backups
    environment:
      PORT: 2456
      NAME: "valheim.objectobject.games"
      WORLD: "Dedicated"
      TZ: "Australia/Sydney"
      PUBLIC: 0
      HTTP_PORT: 3000
      AUTO_UPDATE: 0
      AUTO_BACKUP: true
      AUTO_BACKUP_REMOVE_OLD: 1
      AUTO_BACKUP_DAYS_TO_LIVE: 3
      AUTO_BACKUP_ON_SHUTDOWN: 1
      TYPE: "BepInEx"
      MODS: |
        denikson-BepInExPack_Valheim-5.4.2333
        Advize-Armoire-1.1.4
        Advize-PlantEverything-1.20.0
        Azumatt-AAA_Crafting-2.1.6
        Azumatt-AzuAutoStore-3.0.14
        Azumatt-AzuCraftyBoxes-1.8.14
        Azumatt-AzuExtendedPlayerInventory-2.4.1
        Azumatt-Recycle_N_Reclaim-1.4.0
        Azumatt-RepairStation-1.2.6
        Azumatt-PetPantry-1.0.5
        Azumatt-WardIsLove-3.7.2
        blacks7ar-Explorer-1.1.5
        blacks7ar-VikingsDoSwim-1.4.1
        MathiasDecrock-PlanBuild-0.18.4
        OdinPlus-TeleportEverything-2.9.1
        RandyKnapp-EpicLoot-0.12.11
        Smoothbrain-Blacksmithing-1.3.3
        Smoothbrain-Cooking-1.2.2
        TastyChickenLegs-AutomaticFuel-1.4.8
        ValheimModding-HookGenPatcher-0.0.4
        ValheimModding-Jotunn-2.29.0
        ValheimModding-JsonDotNET-13.0.4
        ValheimModding-YamlDotNet-16.3.1
        Vapok-AdventureBackpacks-1.9.13
        Xutz-ValheimCuisine-2.2.8
