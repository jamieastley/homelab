name: hytale
services:
  auth:
    image: hybrowse/hytale-session-token-broker:1.0.0
    container_name: hytale_auth
    env_file:
      - .env
    environment:
      HYTALE_SESSION_TOKEN_BROKER_BEARER_TOKEN: "" # optional
    volumes:
      - hytale_auth_data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - hytale_internal
      - hytale_auth_external
    healthcheck:
      test: wget -qO - http://localhost:8080/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  init:
    image: busybox
    container_name: hytale_server_init
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumes:
      - hytale_server_data:/data
    restart: "no"

  server:
    image: hybrowse/hytale-server:1.1.0
    container_name: hytale_server
    user: "1000:1000"
    depends_on:
      auth:
        condition: service_started
      init:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      - hytale_server_data:/data
      - hytale_backups:/backups
    ports:
      - "5520:5520/udp"
    secrets:
      - curseforge_api_key
    environment:
      HYTALE_SESSION_TOKEN_BROKER_ENABLED: "true"
      HYTALE_SESSION_TOKEN_BROKER_URL: "http://auth:8080"
      HYTALE_SESSION_TOKEN_BROKER_TIMEOUT_SECONDS: "10"
      HYTALE_ACCEPT_EARLY_PLUGINS: "true"
      HYTALE_AUTO_DOWNLOAD: "true"
      HYTALE_ENABLE_BACKUP: "true"
      HYTALE_BACKUP_DIR: "/backups"
      HYTALE_BACKUP_INTERVAL: "10"
      HYTALE_BACKUP_FREQUENCY_MINUTES: "30"
      HYTALE_BACKUP_ARCHIVE_MAX_COUNT: "5"
      HYTALE_BACKUP_MAX_COUNT: "5"
      HYTALE_CONFIG_SERVER_NAME: "${HYTALE_SERVER_NAME}"
      HYTALE_CONFIG_MOTD: "Welcome back"
      HYTALE_OWNER_UUID: "${HYTALE_OWNER_UUID}"
      HYTALE_CURSEFORGE_API_KEY_SRC: "/run/secrets/curseforge_api_key"
      HYTALE_CURSEFORGE_MODS: |
        1413287 
        1420426
    networks:
      - hytale_internal
      - games_server_tailscale
    labels:
      - tailscale=true
      - traefik.enable=true
      - traefik.instance=games
      - traefik.docker.network=games_server_tailscale # Ensure traefik is attached to the hytale_tailscale network
      - traefik.udp.routers.hytale.entrypoints=hytale
      - traefik.udp.services.hytale.loadbalancer.server.port=5520

secrets:
  curseforge_api_key:
    file: ./secrets/curseforge_api_key.txt

volumes:
  hytale_auth_data:
    name: hytale_auth_data
    external: true
  hytale_server_data:
    name: hytale_server_data
    external: true
  hytale_backups:
    name: hytale_backups
    external: true

networks:
  hytale_internal:
    name: hytale_internal
    internal: true

  hytale_auth_external:
    name: hytale_auth_external

  games_server_tailscale:
    name: games_server_tailscale
    external: true
