# ========================================
# MagicalMounts - Mount Configuration
# ========================================
# Configure stats and gameplay settings for mountable creatures
# Singleplayer: Changes take effect immediately on save
# Multiplayer: Server config syncs to all clients immediately on save

# ===== HORSES MOUNTS =====

mm_horse_white_mount:
  # ===== CREATURE STATS =====
  health: 800                                                                                       # Default: 800 | Mount health
  stamina: 400                                                                                      # Default: 400 | Max stamina when mounted
  stamina_regen: 0.2                                                                                # Default: 0.2 | Stamina regen per second
  stamina_regen_hungry: 0.1                                                                         # Default: 0.1 | Stamina regen when hungry

  # ===== MOVEMENT - GROUND =====
  speed: 2                                                                                          # Default: 2 | Base movement speed
  walk_speed: 2                                                                                     # Default: 2 | Walking speed
  run_speed: 12                                                                                     # Default: 12 | Running speed
  crouch_speed: 2                                                                                   # Default: 2 | Crouching speed
  turn_speed: 110                                                                                   # Default: 110 | Turn speed while walking
  run_turn_speed: 220                                                                               # Default: 220 | Turn speed while running
  acceleration: 0.5                                                                                 # Default: 0.5 | Movement acceleration

  # ===== MOVEMENT - JUMPING =====
  jump_force: 10                                                                                    # Default: 10 | Vertical jump force
  jump_force_forward: 0                                                                             # Default: 0 | Forward momentum when jumping
  jump_force_tired_factor: 0.7                                                                      # Default: 0.7 | Jump force multiplier when tired
  jump_stamina_usage: 10                                                                            # Default: 10 | Stamina cost per jump
  air_control: 0.1                                                                                  # Default: 0.1 | Air control while jumping/flying

  # ===== MOVEMENT - SWIMMING =====
  can_swim: true                                                                                    # Default: true | Options: true, false | Can swim in water
  swim_depth: 2.1                                                                                   # Default: 2.1 | Minimum water depth to swim
  swim_speed: 2                                                                                     # Default: 2 | Swimming speed
  swim_turn_speed: 50                                                                               # Default: 50 | Turn speed while swimming
  swim_acceleration: 0.05                                                                           # Default: 0.05 | Swimming acceleration

  # ===== DAMAGE RESISTANCES =====
  damage_modifiers:                                                                                 # Damage type resistances
    Blunt: Normal                                                                                   # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Slash: Normal                                                                                   # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Pierce: Normal                                                                                  # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Chop: Normal                                                                                    # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Pickaxe: Normal                                                                                 # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Fire: Normal                                                                                    # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Frost: Normal                                                                                   # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Lightning: Normal                                                                               # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Poison: Normal                                                                                  # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak
    Spirit: Normal                                                                                  # Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak

  # ===== AI - DETECTION =====
  view_range: 0                                                                                     # Default: 0 | How far creature can see
  view_angle: 0                                                                                     # Default: 0 | Field of view angle
  hear_range: 0                                                                                     # Default: 0 | How far creature can hear
  mist_vision: 0                                                                                    # Default: 0 | Vision in mist

  # ===== ENVIRONMENTAL TOLERANCES =====
  tolerate_fire: false                                                                              # Default: false | Options: true, false | Can stand in fire without damage
  tolerate_water: true                                                                              # Default: true | Options: true, false | Can stand in water without damage
  tolerate_smoke: false                                                                             # Default: false | Options: true, false | Can stand in smoke without damage
  tolerate_tar: false                                                                               # Default: false | Options: true, false | Can stand in tar without damage

  # ===== ENVIRONMENTAL AVOIDANCE =====
  avoid_fire: false                                                                                 # Default: false | Options: true, false | AI avoids fire
  afraid_of_fire: false                                                                             # Default: false | Options: true, false | AI flees from fire
  avoid_water: false                                                                                # Default: false | Options: true, false | AI avoids water

  # ===== GAMEPLAY SETTINGS =====
  type: Land                                                                                        # Default: Land | Options: Land, Flying, Water | Mount type
  admin_only: Disabled                                                                              # Default: Disabled | Options: Enabled, Disabled | Only admins can use this mount
  use_in_combat: Enabled                                                                            # Default: Enabled | Options: Enabled, Disabled | Can be used during combat
  use_in_void: Disabled                                                                             # Default: Disabled | Options: Enabled, Disabled | Can be used in the void
  biome_blocker: None                                                                               # Default: None | Biome name or null for no blocker
  dungeon_blocker: True                                                                             # Default: True | Prevents use in dungeons
  cooldown: 30                                                                                      # Default: 30 | Cooldown

