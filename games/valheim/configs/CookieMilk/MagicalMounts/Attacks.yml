  ai_attack_range_min:                                                                              # Default:  | Min AI range
  ai_attack_interval:                                                                               # Default:  | Time between attacks
  ai_attack_max_angle:                                                                              # Default:  | Max angle for AI to attack

  # ===== MOVEMENT =====
  speed_factor: 0                                                                                   # Default: 0 | Movement speed during attack

  # ===== TOOL =====
  tool_tier: 3                                                                                      # Default: 3 | Tool tier

  # ===== STAMINA =====
  stamina: 0                                                                                        # Default: 0 | Stamina cost when mounted
  cooldown: 0                                                                                       # Default: 0 | Cooldown between attacks


