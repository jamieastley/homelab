# ========================================
# MagicalMounts - Piece Configuration
# ========================================
# Configure build pieces and their crafting requirements
# Singleplayer: Changes take effect immediately on save
# Multiplayer: Server config syncs to all clients immediately on save

# ===== HORSES =====

mm_horse_white_statue:
  # ===== DISPLAY =====
  name: $piece_mm_horse_white_statue                                                                # Default: $piece_mm_horse_white_statue | Display name for this piece
  description: $piece_mm_horse_white_statue_description                                             # Default: $piece_mm_horse_white_statue_description | Description for this piece

  # ===== SPECIAL PROPERTIES =====
  admin_only: false                                                                                 # Default: false | Options: true, false | Only admins can build this piece

  # ===== COMFORT =====
  comfort: 1                                                                                        # Default: 1 | Comfort value

  # ===== WEAR AND TEAR =====
  health: 1000                                                                                      # Default: 1000 | Piece health
  material_type: HardWood                                                                           # Default: HardWood | Options: Wood, Stone, Iron, HardWood, Marble, Ashstone, Ancient, BlackMarble | Material type for damage calculation
  no_roof_wear: false                                                                               # Default: false | Options: true, false | Immune to rain damage when exposed
  no_support_wear: false                                                                            # Default: false | Options: true, false | Immune to damage from lack of support
  ash_damage_immune: false                                                                          # Default: false | Options: true, false | Immune to ashlands damage
  ash_damage_resist: false                                                                          # Default: false | Options: true, false | Resists ashlands damage
  burnable: false                                                                                   # Default: false | Options: true, false | Can catch fire
  supports: false                                                                                   # Default: false | Options: true, false | Provides structural support
  min_tool_tier: 0                                                                                  # Default: 0 | Minimum tool tier required

  # ===== TOOLS =====
  tools: Hammer                                                                                     # Default: Hammer | Comma-separated list of tools

  # ===== BUILD CATEGORY =====
  category: Custom                                                                                  # Default: Custom | Options: Misc, Crafting, BuildingWorkbench, BuildingStonecutter, Furniture, All, Custom | Build menu category
  custom_category: Statues                                                                          # Default: Statues | Custom category name

  # ===== CRAFTING STATION =====
  crafting_station: Workbench                                                                       # Default: Workbench | Options: None, Workbench, Forge, Cauldron, ArtisanTable, StoneCutter, MageTable, BlackForge, Custom | Required crafting station

  # ===== CRAFTING REQUIREMENTS =====
  required_items:                                                                                   # Materials needed
    DeerMeat: 5                                                                                     # Default: 5 | Amount required

