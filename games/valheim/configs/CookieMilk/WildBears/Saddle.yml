# ========================================
# WildBears - Saddle Configuration
# ========================================

# ===== DEFAULT CONFIG =====
default_config:
  animation_trigger: attach_lox                                                                     # Default: attach_lox | Animation trigger name for saddle attachment
  offset_x: 0                                                                                       # Default: 0 | Left/Right offset
  offset_y: 0                                                                                       # Default: 0 | Up/Down offset
  offset_z: 0                                                                                       # Default: 0 | Forward/Back offset
  rotation_x: 0                                                                                     # Default: 0 | Pitch rotation
  rotation_y: 0                                                                                     # Default: 0 | Yaw rotation
  rotation_z: 0                                                                                     # Default: 0 | Roll rotation

