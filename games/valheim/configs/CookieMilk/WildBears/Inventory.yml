# ========================================
# WildBears - Inventory Configuration
# ========================================
# Configure inventory sizes for all tameable bears
# Singleplayer: Changes take effect immediately on save
# Multiplayer: Server config syncs to all clients immediately on save

# ===== BEARS =====

wb_bear_panda_wild:
  width: 3                                                                                          # Default: 3 | Inventory width
  height: 1                                                                                         # Default: 1 | Inventory height
  armored_width: 4                                                                                  # Default: 4 | Inventory width with armored saddle
  armored_height: 3                                                                                 # Default: 3 | Inventory height with armored saddle

