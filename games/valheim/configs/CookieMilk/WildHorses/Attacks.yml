# ========================================
# WildHorses - Attack Configuration
# ========================================
# Configure weapon and tool attack properties
# Singleplayer: Changes take effect immediately on save
# Multiplayer: Server config syncs to all clients immediately on save

# ===== HORSES =====

wh_horse_black_wild_kick:
  # ===== DAMAGE =====
  damage:                                                                                           # Base damage values for this attack
    true: 0                                                                                         # Default: 0 | Physical damage
    slash: 0                                                                                        # Default: 0 | Slash damage
    pierce: 0                                                                                       # Default: 0 | Pierce damage
    blunt: 5                                                                                        # Default: 5 | Blunt damage
    chop: 0                                                                                         # Default: 0 | Chop damage
    pickaxe: 0                                                                                      # Default: 0 | Pickaxe damage
    fire: 0                                                                                         # Default: 0 | Fire damage
    frost: 0                                                                                        # Default: 0 | Frost damage
    lightning: 0                                                                                    # Default: 0 | Lightning damage
    poison: 0                                                                                       # Default: 0 | Poison damage
    spirit: 0                                                                                       # Default: 0 | Spirit damage
  knockback: 30                                                                                     # Default: 30 | Knockback force
  backstab_bonus: 4                                                                                 # Default: 4 | Backstab damage multiplier
  attack_stamina: 20                                                                                # Default: 20 | Stamina cost per attack

  # ===== DAMAGE MODIFIERS =====
  damage_multiplier: 1                                                                              # Default: 1 | Overall damage multiplier
  force_multiplier: 1                                                                               # Default: 1 | Knockback multiplier
  stagger_multiplier: 1                                                                             # Default: 1 | Stagger multiplier

  # ===== STATUS EFFECTS =====
  attack_status_effect:                                                                             # Default:  | Status effect name
  attack_status_effect_chance: 1                                                                    # Default: 1 | Chance to apply status effect

  # ===== ATTACK BEHAVIOR =====
  attack_range: 5                                                                                   # Default: 5 | How far attack reaches
  attack_angle: 45                                                                                  # Default: 45 | Attack cone angle
  attack_height: 1                                                                                  # Default: 1 | Vertical reach
  attack_ray_width: 1                                                                               # Default: 1 | Width of attack hitbox

  # ===== AI ATTACK BEHAVIOR =====
  ai_attack_range: 5                                                                                # Default: 5 | AI engagement range
  ai_attack_range_min: 0                                                                            # Default: 0 | Min AI range
  ai_attack_interval: 4                                                                             # Default: 4 | Time between attacks
  ai_attack_max_angle: 45                                                                           # Default: 45 | Max angle for AI to attack

  # ===== MOVEMENT =====
  speed_factor: 0                                                                                   # Default: 0 | Movement speed during attack

  # ===== TOOL =====
  tool_tier: 3                                                                                      # Default: 3 | Tool tier
  # ===== STAMINA =====
  attack_stamina: 20                                                                                # Default: 20 | Stamina cost when mounted - Used when 'Use Per-Attack Values' is enabled. 0 = use global config
  cooldown: 0                                                                                       # Default: 0 | Cooldown between attacks - Used when 'Use Per-Attack Values' is enabled. 0 = use global config

