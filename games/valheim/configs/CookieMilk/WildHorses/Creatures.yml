# ========================================
# WildHorses - Creature Configuration
# ========================================
# Configure stats, spawning, taming, and drops for all wild horses
# Singleplayer: Changes take effect immediately on save
# Multiplayer: Server config syncs to all clients immediately on save

# ===== HORSES =====

wh_horse_white_wild:
  # ===== DISPLAY =====
  name: White Horse Wild                                                                            # Default: White Horse Wild | Display name for this creature

  # ===== CREATURE STATS =====
  health: 800                                                                                       # Default: 800 | Creature health
  stamina: 400                                                                                      # Default: 400 | Max stamina when mounted
  stamina_regen: 0.2                                                                                # Default: 0.2 | Stamina regen per second
  stamina_regen_hungry: 0.1                                                                         # Default: 0.1 | Stamina regen when hungry

  # ===== DAMAGE RESISTANCES =====
  damage_modifiers:                                                                                 # Damage type resistances
    Blunt: Normal                                                                                   # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Slash: Normal                                                                                   # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Pierce: Normal                                                                                  # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Chop: Normal                                                                                    # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Pickaxe: Normal                                                                                 # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Fire: Normal                                                                                    # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Frost: Normal                                                                                   # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Lightning: Normal                                                                               # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Poison: Normal                                                                                  # Default: Normal | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type
    Spirit: Immune                                                                                  # Default: Immune | Options: Normal, Resistant, Weak, Immune, Ignore, VeryResistant, VeryWeak | Damage resistance type

  # ===== MOVEMENT - GROUND =====
  crouch_speed: 2                                                                                   # Default: 2 | Crouching speed
  walk_speed: 2                                                                                     # Default: 2 | Walking speed
  speed: 2                                                                                          # Default: 2 | Base movement speed
  run_speed: 12                                                                                     # Default: 12 | Running speed
  turn_speed: 120                                                                                   # Default: 120 | Turn speed while walking
  run_turn_speed: 220                                                                               # Default: 220 | Turn speed while running
  acceleration: 0.5                                                                                 # Default: 0.5 | Movement acceleration

  # ===== MOVEMENT - JUMPING =====
  jump_force: 10                                                                                    # Default: 10 | Vertical jump force
  jump_force_forward: 0                                                                             # Default: 0 | Forward momentum when jumping
  jump_force_tired_factor: 0.7                                                                      # Default: 0.7 | Jump force multiplier when tired
  jump_stamina_usage: 10                                                                            # Default: 10 | Stamina cost per jump
  air_control: 0.1                                                                                  # Default: 0.1 | Air control while jumping

  # ===== MOVEMENT - SWIMMING =====
  swim_speed: 2                                                                                     # Default: 2 | Swimming speed
  swim_turn_speed: 50                                                                               # Default: 50 | Turn speed while swimming
  swim_acceleration: 0.05                                                                           # Default: 0.05 | Swimming acceleration

  # ===== AI - DETECTION =====
  view_range: 30                                                                                    # Default: 30 | How far creature can see
  view_angle: 360                                                                                   # Default: 360 | Field of view angle
  hear_range: 20                                                                                    # Default: 20 | How far creature can hear
  mist_vision: 0                                                                                    # Default: 0 | Can see through mist

  # ===== AI - AGGRESSION =====
  alert_range: 30                                                                                   # Default: 30 | Alert range for nearby creatures
  max_chase_distance: 100                                                                           # Default: 100 | Max distance to chase target
  attack_player_objects: false                                                                      # Default: false | Options: true, false | Attacks player-built structures
  enable_hunt_player: false                                                                         # Default: false | Options: true, false | Actively hunts players
  circulate_while_charging: false                                                                   # Default: false | Options: true, false | Circles target while charging attack
  aggravatable: true                                                                                # Default: true | Options: true, false | Can be aggravated by nearby combat

  # ===== ENVIRONMENTAL TOLERANCES =====
  tolerate_fire: false                                                                              # Default: false | Options: true, false | Immune to fire damage
  tolerate_water: true                                                                              # Default: true | Options: true, false | Immune to water damage
  tolerate_smoke: false                                                                             # Default: false | Options: true, false | Immune to smoke damage
  tolerate_tar: false                                                                               # Default: false | Options: true, false | Immune to tar damage

  # ===== ENVIRONMENTAL AVOIDANCE =====
  avoid_fire: true                                                                                  # Default: true | Options: true, false | Avoids fire when pathfinding
  afraid_of_fire: false                                                                             # Default: false | Options: true, false | Flees from fire sources
  avoid_water: true                                                                                 # Default: true | Options: true, false | Avoids water when pathfinding

  # ===== TAMING =====
  can_be_tamed: true                                                                                # Default: true | Options: true, false | Creature can be tamed
  faction: ForestMonsters                                                                           # Default: ForestMonsters | Faction name
  food_items: Raspberry, Blueberries, Cloudberry, Vineberry, Carrot, Onion, Turnip, Mushroom, MushroomYellow, Honey, Barley, Flax, Dandelion, Thistle, Bread # Default: Raspberry, Blueberries, Cloudberry, Vineberry, Carrot, Onion, Turnip, Mushroom, MushroomYellow, Honey, Barley, Flax, Dandelion, Thistle, Bread | Comma-separated list of food items
  fed_duration: 300                                                                                 # Default: 300 | How long food lasts
  taming_time: 1800                                                                                 # Default: 1800 | Time to tame

  # ===== FOOD HEALING =====
  food_whitelist: []                                                                                # Default: [] | Food items that heal this creature
  food_blacklist: []                                                                                # Default: [] | Food items that cannot heal this creature
  flat_heal_items: {}                                                                               # Default: {{}} | Items that provide flat heal amount
  food_heal_multiplier: 1                                                                           # Default: 1 | Multiplier for food value healing
  food_heal_cooldown: 10                                                                            # Default: 10 | Cooldown between food heals

  # ===== ARMOR BUFFER =====
  armor_buffer_amount: 0                                                                            # Default: 0 | Armor buffer when armored saddle equipped
  armor_regen_rate: 5                                                                               # Default: 5 | Armor regen per second out of combat
  armor_regen_delay: 5                                                                              # Default: 5 | Delay before armor starts regenerating

  # ===== REST SYSTEM =====
  rest_enabled: false                                                                               # Default: false | Options: true, false | Whether creature rests at night
  rest_start_time: 20:00                                                                            # Default: 20:00 | Format: HH:MM or 0-1 fraction | Time when creature goes to rest
  rest_end_time: 08:00                                                                              # Default: 08:00 | Format: HH:MM or 0-1 fraction | Time when creature wakes up
  rest_piece_prefab:                                                                                # Default:  | Piece prefab creature rests at
  rest_radius: 10                                                                                   # Default: 10 | Radius to search for rest piece
  rest_health_regen: 10                                                                             # Default: 10 | Health regen per second while resting
  rest_stamina_regen: 10                                                                            # Default: 10 | Stamina regen per second while resting
  rest_armor_regen: 10                                                                              # Default: 10 | Armor regen per second while resting
  rest_start_sfx:                                                                                   # Default:  | Options: Any SFX prefab name | SFX prefab when entering rest
  rest_start_vfx:                                                                                   # Default:  | Options: Any VFX prefab name | VFX prefab when entering rest
  rest_end_sfx:                                                                                     # Default:  | Options: Any SFX prefab name | SFX prefab when waking up
  rest_end_vfx:                                                                                     # Default:  | Options: Any VFX prefab name | VFX prefab when waking up

  # ===== SPAWNING =====
  can_spawn: false                                                                                  # Default: false | Options: true, false | Spawns naturally in world
  spawns_tamed: false                                                                               # Default: false | Options: true, false | Spawns already tamed
  biome: Meadows                                                                                    # Default: Meadows | Options: Meadows, BlackForest, Swamp, Mountain, Plains, Mistlands, AshLands, DeepNorth, Ocean | Biome where creature spawns
  specific_spawn_area: Everywhere                                                                   # Default: Everywhere | Options: Everywhere, Center, Edge | Area within biome where creature spawns
  forest_spawn: Both                                                                                # Default: Both | Options: Both, ForestOnly, OutsideForest | Forest spawn requirement
  spawn_altitude: 10                                                                                # Default: 10 | Height from ground to spawn
  required_altitude:                                                                                # Default: min-max range | Altitude range required
    min: 5                                                                                                    # Default: 5 | Minimum altitude
    max: 1000                                                                                                    # Default: 1000 | Maximum altitude
  required_ocean_depth:                                                                             # Default: min-max range | Ocean depth range required
    min: 0                                                                                                    # Default: 0 | Minimum ocean depth
    max: 0                                                                                                    # Default: 0 | Maximum ocean depth
  specific_spawn_time: Always                                                                       # Default: Always | Options: Always, Day, Night | Time of day when creature can spawn
  required_weather: ClearSkies                                                                      # Default: ClearSkies | Options: None, Clear, Heath clear, LightRain, Rain, ThunderStorm, nofogts, SwampRain, Darklands_dark, Ashrain, Snow, SnowStorm, DeepForest Mist, Misty, Twilight_Snow, Twilight_SnowStorm, Twilight_Clear, Eikthyr, GDKing, Bonemass, Moder, GoblinKing, Crypt, SunkenCrypt | Weather required for spawning
  required_global_key: None                                                                         # Default: None | Options: None, defeated_eikthyr, defeated_gdking, defeated_bonemass, defeated_dragon, defeated_goblinking, defeated_queen, defeated_fader, defeated_serpent, KilledTroll, killed_surtling, KilledBat | Global key required for spawning
  spawn_chance: 1                                                                                   # Default: 1 | Spawn chance percentage
  maximum: 1                                                                                        # Default: 1 | Max creatures in area
  check_spawn_interval: 600                                                                         # Default: 600 | Spawn check interval
  group_size:                                                                                       # Default: min-max range | Group size range for spawning
    min: 0                                                                                                    # Default: 0 | Minimum group size
    max: 1                                                                                                    # Default: 1 | Maximum group size
  can_have_stars: true                                                                              # Default: true | Options: true, false | Can spawn with star levels
  attack_immediately: false                                                                         # Default: false | Options: true, false | Attacks on sight without hesitation

  # ===== RESPAWN =====
  respawn_enabled: false                                                                            # Default: false | Options: true, false | Whether creature respawns after death
  respawn_cooldown: 600                                                                             # Default: 600 | Cooldown before respawn
  respawn_piece_prefab:                                                                             # Default:  | Piece prefab where creature respawns
  respawn_save_inventory: true                                                                      # Default: true | Options: true, false | Save inventory on death and restore on respawn
  respawn_drop_tombstone: false                                                                     # Default: false | Options: true, false | Drop tombstone with inventory on death
  respawn_tombstone_prefab:                                                                         # Default:  | Options: Any container prefab name | Custom tombstone prefab
  respawn_sfx:                                                                                      # Default:  | Options: Any SFX prefab name | SFX prefab when creature respawns
  respawn_vfx:                                                                                      # Default:  | Options: Any VFX prefab name | VFX prefab when creature respawns

  # ===== DROPS =====
  drops: {}                                                                                         # Default: {} | Drops configuration for this creature

